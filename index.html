<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亀の世話アプリ</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- PWA: Manifest -->
    <link rel="manifest" href="manifest.webmanifest">
    <!-- iOS対応（任意） -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="images/fruits.png">
</head>
<body>
    <div class="container">
        <!-- 左: 餌やり -->
        <div class="left-section">
            <div id="feed-status" class="status">
                <div class="status-text">まだごはんあげてないよ…</div>
            </div>
            <div class="buttons">
                <button class="feed-btn fruit" onclick="feedTurtle('果物')">
                    <img src="images/fruits.png" alt="果物">
                </button>
                <button class="feed-btn pellet" onclick="feedTurtle('亀フード')">
                    <img src="images/turtlefoods.png" alt="亀フード">
                </button>
                <button class="feed-btn veggie" onclick="feedTurtle('野菜')">
                    <img src="images/vegetables.png" alt="野菜">
                </button>
            </div>
        </div>

        <!-- 右: 温浴 -->
        <div class="right-section">
            <div id="bath-status" class="status">
                <div class="status-text">まだお風呂入ってないよ…</div>
            </div>
            <div class="buttons">
                <button class="bath-btn" onclick="bathTurtle()">
                    <img src="images/bath.png" alt="お風呂">
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <!-- PWA: Service Worker 登録 -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(registration => {
              console.log('Service Worker registered with scope:', registration.scope);
            })
            .catch(error => {
              console.log('Service Worker registration failed:', error);
            });
        });
      }
    </script>
</body>
</html>
