<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亀の世話アプリ</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 左: 餌やり -->
        <div class="left-section">
            <div class="header">
                <img src="https://img.icons8.com/emoji/120/000000/turtle.png" alt="亀" class="turtle-icon">
                <h2>ごはんの時間だよ〜</h2>
            </div>
            <div id="feed-status" class="status">
                <div class="status-text">まだごはんあげてないよ…</div>
                <img id="feed-turtle" src="images/turtlefoods.png" alt="待ってる亀" class="status-img">
            </div>
            <div class="buttons">
                <button class="feed-btn fruit" onclick="feedTurtle('果物')">
                    <img src="images/fruits.png" alt="果物">
                    <span>果物</span>
                </button>
                <button class="feed-btn pellet" onclick="feedTurtle('亀フード')">
                    <img src="images/turtlefoods.png" alt="亀フード">
                    <span>亀フード</span>
                </button>
                <button class="feed-btn veggie" onclick="feedTurtle('野菜')">
                    <img src="images/vegetables.png" alt="野菜">
                    <span>野菜</span>
                </button>
            </div>
        </div>

        <!-- 右: 温浴 -->
        <div class="right-section">
            <div class="header">
                <img src="https://img.icons8.com/emoji/120/000000/bathtub.png" alt="お風呂" class="turtle-icon">
                <h2>おふろタイム♪</h2>
            </div>
            <div id="bath-status" class="status">
                <div class="status-text">まだお風呂入ってないよ…</div>
                <img id="bath-turtle" src="images/bath.png" alt="待ってる亀" class="status-img">
            </div>
            <div class="buttons">
                <button class="bath-btn" onclick="bathTurtle()">
                    <img src="images/bath.png" alt="お風呂">
                    <span>お風呂に入れたよ！</span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
